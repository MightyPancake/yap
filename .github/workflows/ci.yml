name: CI

on:
  push: {}
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make git valgrind tcc libclang-dev pkg-config

      - name: Initialize submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive include/utils components/yap-ts
          git submodule update --init --recursive --remote components/yap-c
          git submodule update --init --recursive --remote components/yap-semantic
          git -C components/yap-c submodule update --init --recursive tinycc

      - name: Ensure Valgrind headers are available
        run: test -f /usr/include/valgrind/memcheck.h

      - name: Run workflow
        run: |
          make path
          # Find libclang: on Ubuntu it's in /usr/lib/llvm-18, on Nix in the store.
          # pkg-config gives us both include and lib paths.
          export CLANG_INCDIR="$(pkg-config --variable=includedir clang)"
          export CLANG_LIBDIR="$(pkg-config --variable=libdir clang)"
          echo "CLANG_INCDIR=$CLANG_INCDIR"
          echo "CLANG_LIBDIR=$CLANG_LIBDIR"
          make bindgen_smoke bindgen_header="<stdio.h>"
          make test detailed=true