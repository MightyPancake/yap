name: CI

on:
  push: {}
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make git valgrind tcc libclang-dev pkg-config

      - name: Initialize submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive include/utils components/yap-ts
          git submodule update --init --recursive --remote components/yap-c
          git submodule update --init --recursive --remote components/yap-semantic
          git -C components/yap-c submodule update --init --recursive tinycc

      - name: Ensure Valgrind headers are available
        run: test -f /usr/include/valgrind/memcheck.h

      - name: Run workflow
        run: |
          make path
          # Find libclang include dir (Ubuntu installs to versioned LLVM path)
          CLANG_INCDIR="$(pkg-config --cflags-only-I clang 2>/dev/null | head -c -1 | cut -c3- || true)"
          [ -n "$CLANG_INCDIR" ] && export CLANG_INCDIR
          CLANG_LIBDIR="$(pkg-config --variable=libdir clang 2>/dev/null || true)"
          [ -n "$CLANG_LIBDIR" ] && export CLANG_LIBDIR
          make bindgen_smoke bindgen_header="<stdio.h>"
          make test detailed=true