name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make git valgrind

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Build and install TinyCC
        run: |
          cd modules/yap-c/tinycc
          ./configure --prefix=/usr/local
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig

      - name: Ensure Valgrind headers are available
        run: test -f /usr/include/valgrind/memcheck.h

      - name: Run workflow
        run: make workflow