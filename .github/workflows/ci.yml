name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make git valgrind

      - name: Ensure Valgrind headers are available
        run: test -f /usr/include/valgrind/memcheck.h

      - name: Initialize submodules and build parser
        run: make submodules

      - name: Run tests
        run: make test